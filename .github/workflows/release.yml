name: release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.4). Defaults to package.json version if empty.'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bun
        run: curl -fsSL https://bun.sh/install | bash
        shell: bash

      - name: Add Bun to PATH
        run: echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: bun install

      - name: Build + package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          bun run build
          bun x electron-builder --mac dmg zip --x64=false --publish never

      - name: Read version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(bun -e "console.log(require('./package.json').version)")" >> $GITHUB_OUTPUT
          fi

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: false
          files: |
            release/*
          fail_on_unmatched_files: false
