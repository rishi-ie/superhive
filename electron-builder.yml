appId: com.superhive.app
productName: Superhive
directories:
  output: release
  buildResources: build
files:
  - dist
  - dist-electron
asar: true
extraResources:
  - from: extensions
    to: extensions
# Never auto-publish from electron-builder — even in CI. Releases are managed
# via softprops/action-gh-release in .github/workflows/release.yml.
publish: never
mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
win:
  target:
    - nsis
    - portable
linux:
  target:
    - AppImage
    - deb
  category: Utility
