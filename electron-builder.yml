appId: com.superhive.app
productName: Superhive
directories:
  output: release
  buildResources: build
files:
  - dist
  - dist-electron
  - superhive-pi-context/**
  - superhive-pi-orchestration/**
asar: true
afterPack: build/after-pack.cjs
extraResources:
  - from: superhive-pi-context
    to: extensions/superhive-pi-context
  - from: superhive-pi-orchestration
    to: extensions/superhive-pi-orchestration
mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
win:
  target:
    - nsis
    - portable
linux:
  target:
    - AppImage
    - deb
  category: Utility
